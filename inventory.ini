# ==========================================================
# Ansible Inventory File
# Multi-Server DevOps Environment Setup
# ==========================================================
# Replace <EC2-PUBLIC-IP-X> with your actual EC2 IPs
# ==========================================================

[devops_servers]
target1 ansible_host=<EC2-PUBLIC-IP-1>
target2 ansible_host=<EC2-PUBLIC-IP-2>
target3 ansible_host=<EC2-PUBLIC-IP-3>
target4 ansible_host=<EC2-PUBLIC-IP-4>
target5 ansible_host=<EC2-PUBLIC-IP-5>

# ==========================================================
# Group Variables - Common SSH config for all target servers
# ==========================================================
[devops_servers:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/your-key.pem
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
